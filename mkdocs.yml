site_name: zendoc
site_description: A family of Python-Markdown extensions for section cross-references and bibliography/citation handling.
site_url: https://buckwem.github.io/zendoc-extension/
repo_url: https://github.com/buckwem/zendoc-extension
repo_name: buckwem/zendoc-extension
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Installation: installation.md
  - Extensions:
      - Headings: extensions/headings.md
      - Refs: extensions/refs.md
  - About:
      - Release Notes: about/changelog.md
      - License: about/license.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/buckwem/zendoc-extension
