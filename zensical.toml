[project]
site_name = "prodockit"
site_description = "A family of extensions for Zensical needed for professional and academic documentation: section cross-references, bibliography/citation handling, a glossary, and a Pandoc/WeasyPrint PDF pipeline."
site_author = "Mark Buckwell"
site_url = "https://buckwem.github.io/prodockit-extensions/"

repo_url = "https://github.com/buckwem/prodockit-extensions"
repo_name = "buckwem/prodockit-extensions"
edit_uri = "edit/main/docs/"

# Single-line, not a triple-quoted block: prodockit.pdf substitutes this
# verbatim into a CSS `content: "..."` string for the PDF's running
# footer - a triple-quoted string's own embedded newlines break that CSS
# declaration, silently dropping the whole footer with no error (harmless
# on the website, whose own copy renders through normal HTML instead,
# which collapses whitespace). A literal "©" character, not the "&copy;"
# HTML entity, for the same reason - CSS content strings don't decode
# HTML entities, so "&copy;" would show up as those 6 literal characters
# in the PDF footer instead of the symbol.
copyright = "Copyright © 2026 Mark Buckwell and contributors"

extra_css = ["stylesheets/extra.css"]

nav = [
  {"Home" = "index.md"},
  {"Introduction" = "introduction.md"},
  {"Installation" = "installation.md"},
  {"Extensions" = [
    {"Headings" = "extensions/headings.md"},
    {"Refs" = "extensions/refs.md"},
    {"Citations or References" = "extensions/citations.md"},
    {"Acronyms and Glossary" = "extensions/glossary.md"},
    {"Tables" = "extensions/tables.md"},
    {"Bibliography" = "extensions/bibliography.md"},
    {"Index terms" = "extensions/index-terms.md"},
  ]},
  {"PDF generation" = "pdf.md"},
  {"Website macros" = "macros.md"},
  {"About" = [
    {"Release Notes" = "about/changelog.md"},
    {"License" = "about/license.md"},
  ]},
]

[project.theme]
logo = "assets/logo_black.png"
custom_dir = "overrides"
language = "en"
features = [
  "announce.dismiss",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.integrate",
]

[project.theme.icon]
view = "lucide/eye"
repo = "fontawesome/brands/github"

[project.theme.icon.admonition]
note = "fontawesome/solid/note-sticky"
abstract = "fontawesome/solid/book"
info = "fontawesome/solid/circle-info"
tip = "fontawesome/solid/bullhorn"
success = "fontawesome/solid/check"
question = "fontawesome/solid/circle-question"
warning = "fontawesome/solid/triangle-exclamation"
failure = "fontawesome/solid/bomb"
danger = "fontawesome/solid/skull"
bug = "fontawesome/solid/robot"
example = "fontawesome/solid/flask"
quote = "fontawesome/solid/quote-left"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/buckwem/prodockit-extensions"

# ----------------------------------------------------------------------------
# Markdown extensions used to render these docs. pymdownx.snippets is used to
# embed LICENSE (outside docs_dir) into about/license.md.
# ----------------------------------------------------------------------------
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions."prodockit.tables"]
[project.markdown_extensions."prodockit.index"]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
