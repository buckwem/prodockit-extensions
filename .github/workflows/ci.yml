name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # prodockit.bibliography's own tests need a real pandoc install - its
      # citation/bibliography formatting is delegated entirely to `pandoc
      # --citeproc`, so a fake stand-in (unlike the plain stub used
      # elsewhere for prodockit.pdf's own orchestration-only tests)
      # wouldn't actually test anything meaningful.
      - run: sudo apt-get update && sudo apt-get install -y pandoc
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest --cov=prodockit

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -e .
      - run: zensical build --clean --strict
